<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чат</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #0e0e12; color: #e8e8f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ======== SETUP ======== */
#setup { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 16px; padding: 24px;
  background: #0e0e12; position: relative; overflow: hidden; }
#setup::before { content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 30% 20%, rgba(124,106,247,.18) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(124,106,247,.12) 0%, transparent 55%); pointer-events:none; }
h1 { font-size: 26px; font-weight: 700; }
input { width: 100%; max-width: 320px; padding: 14px; background: #18181f; border: 1.5px solid #2a2a36;
  border-radius: 12px; color: #e8e8f0; font-size: 16px; outline: none; transition: border .2s; }
input:focus { border-color: #7c6af7; }
#btn1 { width: 100%; max-width: 320px; padding: 15px; background: #7c6af7; border: none;
  border-radius: 12px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: background .2s; }
#btn1:hover { background: #6b59e6; }

/* ======== CHAT ======== */
#chat { display: none; flex-direction: column; flex: 1; overflow: hidden; position: relative; }

/* фоновое фото */
#chatBg { position: absolute; inset: 0; background-size: cover; background-position: center;
  opacity: 0.13; pointer-events: none; z-index: 0; }

/* шапка */
#header { background: rgba(24,24,31,.95); border-bottom: 1px solid #2a2a36;
  padding: 10px 14px; display: flex; align-items: center; gap: 10px; z-index: 10; backdrop-filter: blur(8px); }
#header .ava { width: 36px; height: 36px; border-radius: 50%; background: #7c6af7;
  display: flex; align-items: center; justify-content: center; flex-shrink:0; font-size:18px; }
#header .info { flex: 1; }
#rtitle { font-weight: 600; font-size: 16px; }
#status { font-size: 12px; color: #a99ef9; }
.hbtn { width: 40px; height: 40px; border-radius: 50%; background: #22222c; border: none;
  color: #e8e8f0; font-size: 18px; cursor: pointer; display: flex; align-items: center;
  justify-content: center; transition: background .2s; flex-shrink:0; }
.hbtn:hover { background: #2e2e3e; }
#callBtn { background: #22222c; }
#bgBtn { background: #22222c; }

/* сообщения */
#msgs { flex: 1; overflow-y: auto; padding: 10px 12px 10px; display: flex;
  flex-direction: column; gap: 4px; z-index: 1; position: relative; }
#msgs::-webkit-scrollbar { width: 4px; }
#msgs::-webkit-scrollbar-track { background: transparent; }
#msgs::-webkit-scrollbar-thumb { background: #2a2a36; border-radius: 4px; }

.msgWrap { display: flex; flex-direction: column; }
.msgWrap.me { align-items: flex-end; }
.msgWrap.them { align-items: flex-start; }

.name { font-size: 11px; color: #a99ef9; margin-bottom: 2px; padding: 0 4px; }

/* reply preview */
.reply-preview { font-size: 12px; padding: 6px 10px; border-radius: 10px 10px 0 0;
  border-left: 3px solid #7c6af7; max-width: 75%; word-break: break-word; }
.me .reply-preview { background: rgba(255,255,255,.12); }
.them .reply-preview { background: rgba(255,255,255,.07); }
.reply-preview .reply-author { font-weight: 600; color: #a99ef9; font-size: 11px; margin-bottom: 2px; }
.reply-preview .reply-text { color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.bubble { max-width: 75%; padding: 9px 13px; border-radius: 16px; font-size: 15px;
  word-break: break-word; line-height: 1.4; position: relative; }
.bubble.out { background: #7c6af7; color: white; border-bottom-right-radius: 4px; }
.bubble.in  { background: #22222c; border-bottom-left-radius: 4px; }

/* reply присоединена к пузырю сверху */
.has-reply { border-radius: 4px 16px 16px 4px !important; }
.me .has-reply { border-radius: 16px 4px 4px 16px !important; }

/* кнопка ответить (появляется при свайпе/наведении) */
.msgWrap:hover .reply-btn { opacity:1; }
.reply-btn { opacity:0; transition: opacity .2s; background: none; border: none;
  color: #a99ef9; font-size: 14px; cursor: pointer; padding: 4px 6px; align-self: center; }

.ts { font-size: 10px; color: #666; padding: 1px 4px; }

.bubble.sys { align-self: center; font-size: 12px; color: #8888aa; background: rgba(34,34,44,.8);
  padding: 4px 12px; border-radius: 20px; max-width: 85%; }

/* картинка */
.img-bubble { max-width: 220px; border-radius: 14px; overflow: hidden; cursor: pointer; }
.img-bubble img { width: 100%; display: block; }
.img-bubble.out { border-bottom-right-radius: 4px; }
.img-bubble.in  { border-bottom-left-radius: 4px; }

/* видео */
.vid-bubble { max-width: 240px; border-radius: 14px; overflow: hidden; cursor: pointer; background: #000; }
.vid-bubble video { width: 100%; display: block; max-height: 180px; object-fit: cover; }
.vid-bubble.out { border-bottom-right-radius: 4px; }
.vid-bubble.in  { border-bottom-left-radius: 4px; }

/* ======== PANEL REPLY ======== */
#replyBar { display: none; background: #18181f; border-top: 1px solid #2a2a36;
  padding: 8px 14px; z-index: 10; align-items: center; gap: 10px; }
#replyBar.show { display: flex; }
#replyInfo { flex: 1; border-left: 3px solid #7c6af7; padding-left: 8px; }
#replyAuthor { font-size: 11px; color: #a99ef9; font-weight: 600; }
#replyText { font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
#replyClose { background: none; border: none; color: #888; font-size: 18px; cursor: pointer; }

/* ======== BAR ======== */
.bar { background: rgba(24,24,31,.97); border-top: 1px solid #2a2a36;
  padding: 8px 10px; display: flex; gap: 8px; align-items: flex-end; z-index: 10; backdrop-filter: blur(6px); }
textarea { flex: 1; background: #22222c; border: 1.5px solid #2a2a36; border-radius: 18px;
  padding: 10px 14px; color: #e8e8f0; font-size: 15px; outline: none; resize: none;
  max-height: 100px; font-family: sans-serif; transition: border .2s; }
textarea:focus { border-color: #7c6af7; }
.ibtn { width: 44px; height: 44px; border-radius: 50%; background: #22222c; border: none;
  color: #e8e8f0; font-size: 20px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background .2s; }
.ibtn:hover { background: #2e2e3e; }
#btn2 { width: 44px; height: 44px; border-radius: 50%; background: #7c6af7; border: none;
  color: white; font-size: 20px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background .2s; }
#btn2:hover { background: #6b59e6; }

/* ======== LIGHTBOX ======== */
#lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85); z-index: 200;
  align-items: center; justify-content: center; }
#lb.open { display: flex; }
#lb img, #lb video { max-width: 95vw; max-height: 90vh; border-radius: 12px; }
#lbx { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,.6); border: none;
  color: white; font-size: 22px; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; }

/* ======== INCOMING CALL OVERLAY ======== */
#callOverlay { display: none; position: fixed; inset: 0; z-index: 300;
  flex-direction: column; align-items: center; justify-content: center;
  background: rgba(14,14,18,.96); backdrop-filter: blur(12px); }
#callOverlay.show { display: flex; }
#callCallerAva { width: 90px; height: 90px; border-radius: 50%; background: #7c6af7;
  display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 16px;
  box-shadow: 0 0 0 0 rgba(124,106,247,.6); animation: ring 1.4s infinite; }
@keyframes ring {
  0%   { box-shadow: 0 0 0 0 rgba(124,106,247,.6); }
  70%  { box-shadow: 0 0 0 28px rgba(124,106,247,0); }
  100% { box-shadow: 0 0 0 0 rgba(124,106,247,0); }
}
#callCallerName { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
#callCallerSub  { font-size: 14px; color: #a99ef9; margin-bottom: 48px; }
.callActions { display: flex; gap: 40px; }
.callBtn { width: 68px; height: 68px; border-radius: 50%; border: none; cursor: pointer;
  font-size: 26px; display: flex; align-items: center; justify-content: center;
  transition: transform .15s; }
.callBtn:active { transform: scale(.92); }
#acceptCallBtn { background: #2ecc71; color: white; }
#rejectCallBtn  { background: #e74c3c; color: white; }
.callBtn-label { font-size: 12px; color: #aaa; text-align: center; margin-top: 8px; }
.callBtnWrap { display: flex; flex-direction: column; align-items: center; }

/* ======== ACTIVE CALL SCREEN ======== */
#callScreen { display: none; position: fixed; inset: 0; z-index: 250;
  background: #0a0a0e; flex-direction: column; }
#callScreen.show { display: flex; }

/* видео потоки */
#remoteVideo { flex: 1; width: 100%; object-fit: cover; background: #111; }


/* для аудио-звонка — аватар вместо видео */
#callAvaBig { display: none; flex: 1; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
#callAvaBig .ava-big { width: 110px; height: 110px; border-radius: 50%; background: #7c6af7;
  font-size: 50px; display: flex; align-items: center; justify-content: center;
  animation: ring 1.6s infinite; }
#callAvaBig .call-name { font-size: 22px; font-weight: 700; }
#callAvaBig .call-timer { font-size: 14px; color: #a99ef9; }

/* панель управления звонком */
#callControls { position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(14,14,18,.85); backdrop-filter: blur(10px);
  padding: 16px 0 28px; display: flex; justify-content: center; gap: 24px; align-items: center; }
.ctrlBtn { width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer;
  font-size: 22px; display: flex; align-items: center; justify-content: center;
  background: #22222c; color: #e8e8f0; transition: background .2s; }
.ctrlBtn:hover { background: #2e2e3e; }
.ctrlBtn.active { background: #7c6af7; }
#endCallBtn { background: #e74c3c; color: white; width: 64px; height: 64px; font-size: 24px; }
#endCallBtn:hover { background: #c0392b; }

/* call status bar */
#callHeader { position: absolute; top: 0; left: 0; right: 0; padding: 12px 16px;
  display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,.35);
  backdrop-filter: blur(6px); z-index: 11; }
#callHeaderName { font-weight: 600; font-size: 16px; }
#callHeaderTimer { font-size: 13px; color: #a99ef9; margin-left: auto; }

/* ======== BG PICKER ======== */
#bgPicker { display: none; position: fixed; bottom: 80px; right: 14px; z-index: 150;
  background: #18181f; border: 1px solid #2a2a36; border-radius: 16px; padding: 12px; gap: 8px;
  flex-direction: column; min-width: 180px; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
#bgPicker.show { display: flex; }
#bgPicker p { font-size: 12px; color: #8888aa; margin-bottom: 4px; }
.bgOpt { padding: 9px 14px; border-radius: 10px; cursor: pointer; font-size: 14px;
  border: none; background: #22222c; color: #e8e8f0; text-align: left; transition: background .2s; }
.bgOpt:hover { background: #2e2e3e; }
#bgFileIn { display: none; }

#fileIn  { display: none; }
#videoIn { display: none; }
</style>
</head>
<body>

<!-- ======== SETUP ======== -->
<div id="setup">
  <h1>💬 Чат</h1>
  <p style="color:#8888aa;text-align:center;font-size:14px">Введи имя и название комнаты — друг вводит то же самое</p>
  <input id="n" placeholder="Твоё имя" maxlength="20">
  <input id="r" placeholder="Название комнаты" maxlength="30">
  <button id="btn1">Войти в чат →</button>
</div>

<!-- ======== CHAT ======== -->
<div id="chat">
  <div id="chatBg" data-bg-default="1"></div>

  <!-- Шапка -->
  <div id="header">
    <div class="ava">🏠</div>
    <div class="info">
      <div id="rtitle"></div>
      <div id="status"></div>
    </div>
    <button class="hbtn" id="bgBtn" title="Фон">🖼️</button>
    <button class="hbtn" id="callBtn" title="Аудиозвонок">📞</button>
  </div>

  <!-- Сообщения -->
  <div id="msgs"></div>

  <!-- Панель ответа -->
  <div id="replyBar">
    <div id="replyInfo">
      <div id="replyAuthor"></div>
      <div id="replyText"></div>
    </div>
    <button id="replyClose">✕</button>
  </div>

  <!-- Панель ввода -->
  <div class="bar">
    <button class="ibtn" id="photoBtn" title="Фото">📷</button>
    <button class="ibtn" id="videoBtn" title="Видео">🎬</button>
    <textarea id="txt" placeholder="Написать..." rows="1"></textarea>
    <button id="btn2">➤</button>
  </div>

  <input type="file" id="fileIn"  accept="image/*">
  <input type="file" id="videoIn" accept="video/*">
</div>

<!-- ======== LIGHTBOX ======== -->
<div id="lb">
  <button id="lbx">✕</button>
  <img id="lbImg" src="" style="display:none">
  <video id="lbVid" src="" controls style="display:none"></video>
</div>

<!-- ======== INCOMING CALL ======== -->
<div id="callOverlay">
  <div id="callCallerAva">👤</div>
  <div id="callCallerName">Входящий звонок</div>
  <div id="callCallerSub" id="callCallerSub">Входящий звонок...</div>
  <div class="callActions">
    <div class="callBtnWrap">
      <button class="callBtn" id="rejectCallBtn">📵</button>
      <div class="callBtn-label">Сброс</div>
    </div>
    <div class="callBtnWrap">
      <button class="callBtn" id="acceptCallBtn">📞</button>
      <div class="callBtn-label">Принять</div>
    </div>
  </div>
</div>

<!-- ======== ACTIVE CALL SCREEN ======== -->
<div id="callScreen">
  <div id="callHeader">
    <div id="callHeaderName"></div>
    <div id="callHeaderTimer">00:00</div>
  </div>
  <!-- Аватар для аудио -->
  <div id="callAvaBig">
    <div class="ava-big">👤</div>
    <div class="call-name"></div>
    <div class="call-timer">00:00</div>
  </div>
  <!-- Видео -->
  <video id="remoteVideo" autoplay playsinline muted></video>

  <div id="callControls">
    <button class="ctrlBtn" id="muteMicBtn" title="Микрофон">🎤</button>
    <button class="ctrlBtn" id="speakerBtn" title="Громкость">🔊</button>
    <button class="ctrlBtn" id="endCallBtn">📵</button>
  </div>
</div>

<!-- ======== BG PICKER ======== -->
<div id="bgPicker">
  <p>Фон чата</p>
  <button class="bgOpt" data-bg="none">Без фона</button>
  <button class="bgOpt" data-bg="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800">👤 Горы (по умолч.)</button>
  <button class="bgOpt" data-bg="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=800">🌌 Горы ночью</button>
  <button class="bgOpt" data-bg="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800">🏔️ Туман</button>
  <button class="bgOpt" data-bg="https://images.unsplash.com/photo-1465146344425-f00d5f5c8f07?w=800">🌸 Природа</button>
  <button class="bgOpt" data-bg="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=800">🌊 Озеро</button>
  <button class="bgOpt" id="bgCustomBtn">📁 Своё фото...</button>
  <input type="file" id="bgFileIn" accept="image/*">
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
/* ========== GLOBALS ========== */
var FC = null;
try { var s = localStorage.getItem('fc'); if(s) FC = JSON.parse(s); } catch(e) {}

var myName='', myRoom='', db=null, ref=null, fbOk=false;
var typingTimer=null, lastTyping=0, leaveTimer=null;
var replyTo = null; // { from, text }

function $(id) { return document.getElementById(id); }

/* ========== FIREBASE ========== */
function initFB(cfg) {
  try {
    var app = firebase.initializeApp(cfg, 'a'+Date.now());
    db = firebase.database(app);
    fbOk = true;
    return true;
  } catch(e) { return false; }
}

/* ========== ENTER CHAT ========== */
$('btn1').onclick = function() {
  var n = $('n').value.trim();
  var r = $('r').value.trim().replace(/\s+/g,'-').toLowerCase();
  if (!n) { alert('Введи имя'); return; }
  if (!r) { alert('Введи название комнаты'); return; }
  myName = n; myRoom = r;
  $('setup').style.display = 'none';
  $('chat').style.display = 'flex';
  $('rtitle').textContent = '# ' + r;
  $('callHeaderName').textContent = r;
  $('callAvaBig').querySelector('.call-name').textContent = r;

  if (FC && initFB(FC)) { startChat(); }
  else {
    var cfg = prompt('Вставь Firebase конфигурацию (от { до }):');
    if (cfg) {
      try {
        var parsed = JSON.parse(cfg);
        localStorage.setItem('fc', JSON.stringify(parsed));
        FC = parsed;
        if (initFB(parsed)) startChat();
        else alert('Ошибка подключения');
      } catch(e) { alert('Неверный формат'); }
    } else {
      $('status').textContent = '⚠️ Демо-режим';
      addMsg({ sys: true, text: 'Демо-режим. Подключи Firebase для общения.' });
    }
  }
};

/* ========== START CHAT ========== */
function startChat() {
  $('status').textContent = '🟢 онлайн';
  $('msgs').innerHTML = '';
  ref = db.ref('r/' + myRoom + '/m');
  ref.on('child_added', function(s) { var m = s.val(); if(m) addMsg(m); });

  // typing
  db.ref('r/' + myRoom + '/t').on('value', function(s) {
    var d = s.val() || {};
    var others = Object.keys(d).filter(function(k) { return k !== myName && Date.now() - d[k] < 4000; });
    if (!inCall) $('status').textContent = others.length ? others[0] + ' печатает...' : '🟢 онлайн';
  });

  ref.push({ sys: true, text: myName + ' вошёл в чат', ts: firebase.database.ServerValue.TIMESTAMP });
  setupPresence();
  listenCalls();
}

function setupPresence() {
  var presRef = db.ref('r/' + myRoom + '/p/' + myName);
  presRef.set(Date.now());
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      leaveTimer = setTimeout(function() {
        presRef.remove();
        ref.push({ sys: true, text: myName + ' вышел из чата', ts: firebase.database.ServerValue.TIMESTAMP });
      }, 20000);
    } else {
      clearTimeout(leaveTimer);
      presRef.set(Date.now());
    }
  });
  window.addEventListener('beforeunload', function() {
    if(ref) ref.push({ sys: true, text: myName + ' вышел из чата', ts: firebase.database.ServerValue.TIMESTAMP });
    presRef.remove();
  });
}

/* ========== ADD MESSAGE ========== */
function addMsg(m) {
  var w = $('msgs');
  var wrap = document.createElement('div');
  wrap.className = 'msgWrap';

  if (m.sys) {
    var el = document.createElement('div');
    el.className = 'bubble sys';
    el.textContent = m.text;
    wrap.appendChild(el);
    w.appendChild(wrap);
    w.scrollTop = w.scrollHeight;
    return;
  }

  var isMe = m.from === myName;
  wrap.classList.add(isMe ? 'me' : 'them');
  // хранить данные для ответа
  wrap.dataset.from = m.from;
  wrap.dataset.text = m.text || (m.type === 'image' ? '📷 Фото' : m.type === 'video' ? '🎬 Видео' : '');
  wrap.dataset.msgId = m.ts || Date.now();

  // имя
  if (!isMe) {
    var nm = document.createElement('div');
    nm.className = 'name';
    nm.textContent = m.from;
    wrap.appendChild(nm);
  }

  var contentRow = document.createElement('div');
  contentRow.style.display = 'flex';
  contentRow.style.alignItems = 'flex-end';
  contentRow.style.gap = '4px';
  if (isMe) contentRow.style.flexDirection = 'row-reverse';

  // кнопка ответить
  var rBtn = document.createElement('button');
  rBtn.className = 'reply-btn';
  rBtn.title = 'Ответить';
  rBtn.textContent = '↩';
  rBtn.onclick = function() { setReply(m.from, wrap.dataset.text); };
  contentRow.appendChild(rBtn);

  var msgCol = document.createElement('div');
  msgCol.style.display = 'flex';
  msgCol.style.flexDirection = 'column';
  msgCol.style.alignItems = isMe ? 'flex-end' : 'flex-start';
  msgCol.style.maxWidth = '80%';

  // reply preview
  if (m.replyTo) {
    var rp = document.createElement('div');
    rp.className = 'reply-preview';
    var ra = document.createElement('div'); ra.className = 'reply-author'; ra.textContent = m.replyTo.from;
    var rt = document.createElement('div'); rt.className = 'reply-text'; rt.textContent = m.replyTo.text;
    rp.appendChild(ra); rp.appendChild(rt);
    msgCol.appendChild(rp);
  }

  if (m.type === 'image') {
    var ib = document.createElement('div');
    ib.className = 'img-bubble ' + (isMe ? 'out' : 'in');
    if (m.replyTo) ib.classList.add('has-reply');
    var img = document.createElement('img');
    img.src = m.data; img.loading = 'lazy';
    img.onclick = function() { openLB('img', this.src); };
    ib.appendChild(img);
    msgCol.appendChild(ib);
  } else if (m.type === 'video') {
    var vb = document.createElement('div');
    vb.className = 'vid-bubble ' + (isMe ? 'out' : 'in');
    if (m.replyTo) vb.classList.add('has-reply');
    var vid = document.createElement('video');
    vid.src = m.data; vid.controls = true; vid.preload = 'metadata';
    vid.style.width = '100%';
    vb.appendChild(vid);
    // клик для открытия в лайтбоксе
    vb.ondblclick = function() { openLB('video', m.data); };
    msgCol.appendChild(vb);
  } else {
    var b = document.createElement('div');
    b.className = 'bubble ' + (isMe ? 'out' : 'in');
    if (m.replyTo) b.classList.add('has-reply');
    b.textContent = m.text;
    msgCol.appendChild(b);
  }

  // timestamp
  if (m.ts) {
    var t = document.createElement('div');
    t.className = 'ts';
    var d = new Date(typeof m.ts === 'number' ? m.ts : Date.now());
    t.textContent = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    msgCol.appendChild(t);
  }

  contentRow.appendChild(msgCol);
  wrap.appendChild(contentRow);
  w.appendChild(wrap);
  w.scrollTop = w.scrollHeight;
}

/* ========== REPLY ========== */
function setReply(from, text) {
  replyTo = { from: from, text: text };

}

/* ========== SEND TEXT ========== */
function send() {
  var txt = $('txt').value.trim();
  if (!txt) return;
  $('txt').value = '';
  $('txt').style.height = 'auto';
  var msg = { from: myName, text: txt, ts: fbOk ? firebase.database.ServerValue.TIMESTAMP : Date.now() };
  if (replyTo) { msg.replyTo = replyTo; replyTo = null; $('replyBar').classList.remove('show'); }
  if (fbOk && ref) {
    ref.push(msg);
    db.ref('r/' + myRoom + '/t/' + myName).remove();
  } else { addMsg(msg); }
}

$('btn2').onclick = send;

/* ==========================================
   WEBRTC CALLS
   ========================================== */
var pc = null, localStream = null, inCall = false, callTimer = null, callSeconds = 0;
var isVideoCalling = false;
var callRef = null, sigRef = null;

function listenCalls() {
  if (!fbOk) return;
  callRef = db.ref('r/' + myRoom + '/call');
  callRef.on('value', function(s) {
    var d = s.val();
    if (!d) return;
    if (d.to === myName && d.status === 'ringing' && !inCall) {
      showIncoming(d);
    }
    if (d.from === myName && d.status === 'rejected') {
      endCall(true);
      addMsg({ sys: true, text: 'Звонок отклонён', ts: Date.now() });
    }
    if (d.status === 'ended' && inCall) {
      endCall(true);
    }
  });

  // signaling
  sigRef = db.ref('r/' + myRoom + '/sig');
  sigRef.on('child_added', function(s) {
    var sig = s.val();
    if (!sig || sig.to !== myName) return;
    handleSignal(sig);
    s.ref.remove();
  });
}

function showIncoming(d) {
  $('callCallerName').textContent = d.from;
  $('callCallerSub').textContent = d.video ? '📹 Видеозвонок' : '📞 Аудиозвонок';
  isVideoCalling = !!d.video;
  $('callOverlay').classList.add('show');
}

$('acceptCallBtn').onclick  = function() { answerCall(false); };
$('rejectCallBtn').onclick  = function() {
  $('callOverlay').classList.remove('show');
  if (fbOk) callRef.update({ status: 'rejected' });
};

// startAudioCall/startVideoCall removed (using doInitiateCall instead)

async function answerCall(withVideo) {
  $('callOverlay').classList.remove('show');
  isVideoCalling = withVideo;
  await setupPC(withVideo, false);
  callRef.update({ status: 'active' });
}

async function setupPC(withVideo, isInitiator) {
  inCall = true;
  startCallTimer();

  var constraints = { audio: true, video: withVideo ? { facingMode: 'user' } : false };
  try { localStream = await navigator.mediaDevices.getUserMedia(constraints); }
  catch(e) { alert('Нет доступа к камере/микрофону: ' + e.message); inCall=false; return; }


  if (withVideo) {
    $('remoteVideo').style.display = 'block';
    $('callAvaBig').style.display  = 'none';
  } else {
    $('remoteVideo').style.display = 'none';
    $('callAvaBig').style.display  = 'flex';
  }

  pc = new RTCPeerConnection({ iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ]});

  localStream.getTracks().forEach(function(t) { pc.addTrack(t, localStream); });

  pc.ontrack = function(e) {
    $('remoteVideo').srcObject = e.streams[0];
    if (withVideo) $('remoteVideo').style.display = 'block';
  };

  pc.onicecandidate = function(e) {
    if (e.candidate) {
      sigRef.push({ to: isInitiator ? getCalleeFromRef() : getCallerFromRef(),
        type: 'candidate', data: e.candidate.toJSON() });
    }
  };

  $('callScreen').classList.add('show');

  if (isInitiator) {
    var offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    sigRef.push({ to: getCalleeFromRef(), type: 'offer', data: { sdp: offer.sdp, type: offer.type } });
  }
}

async function handleSignal(sig) {
  if (!pc) return;
  if (sig.type === 'offer') {
    await pc.setRemoteDescription(new RTCSessionDescription(sig.data));
    var answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    sigRef.push({ to: getCallerFromRef(), type: 'answer', data: { sdp: answer.sdp, type: answer.type } });
  } else if (sig.type === 'answer') {
    await pc.setRemoteDescription(new RTCSessionDescription(sig.data));
  } else if (sig.type === 'candidate') {
    try { await pc.addIceCandidate(new RTCIceCandidate(sig.data)); } catch(e) {}
  }
}

function getCallerFromRef() {
  // async — используем кеш
  return callOverlayCallerName || myRoom;
}
var callOverlayCallerName = '';
// перехватываем имя при входящем
var _origShowIncoming = showIncoming;
showIncoming = function(d) { callOverlayCallerName = d.from; _origShowIncoming(d); };

function getCalleeFromRef() {
  // в initiate мы уже отправили callRef, читаем to из локального callRef
  // для простоты храним
  return _callTarget;
}
var _callTarget = '';
var _origInitiateCall = initiateCall;

// Переопределяем через обёртку для хранения target
var _origSetup = setupPC;

// хранение target при инициации
$('callBtn').onclick = function() {
  if (!fbOk) { alert('Нужен Firebase'); return; }
  doInitiateCall(false);
};
async function doInitiateCall(withVideo) {
  isVideoCalling = withVideo;
  var presSnap = await db.ref('r/' + myRoom + '/p').once('value');
  var pres = presSnap.val() || {};
  var others = Object.keys(pres).filter(function(k) { return k !== myName; });
  if (!others.length) { alert('Никого нет в комнате'); return; }
  _callTarget = others[0];

  callRef.set({ from: myName, to: _callTarget, status: 'ringing', video: withVideo, ts: Date.now() });
  addMsg({ sys: true, text: (withVideo ? '📹' : '📞') + ' Звонок → ' + _callTarget, ts: Date.now() });
  await setupPC(withVideo, true);
}

/* мут / камера / громкий */
var micMuted = false, camMuted = false;
$('muteMicBtn').onclick = function() {
  if (!localStream) return;
  micMuted = !micMuted;
  localStream.getAudioTracks().forEach(function(t) { t.enabled = !micMuted; });
  this.textContent = micMuted ? '🔇' : '🎤';
  this.classList.toggle('active', micMuted);
};

$('speakerBtn').onclick = function() {
  var v = $('remoteVideo');
  v.muted = !v.muted;
  this.textContent = v.muted ? '🔕' : '🔊';
  this.classList.toggle('active', v.muted);
};
$('endCallBtn').onclick = function() { endCall(false); };

function endCall(remote) {
  $('callScreen').classList.remove('show');
  $('callOverlay').classList.remove('show');
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(function(t) { t.stop(); }); localStream = null; }
  $('remoteVideo').srcObject = null;
  if (!remote && fbOk && callRef) callRef.update({ status: 'ended' });
  inCall = false; micMuted = false; camMuted = false;
  $('muteMicBtn').textContent = '🎤';
  $('remoteVideo').muted = false; $('speakerBtn').textContent = '🔊';
  stopCallTimer();
  if(ref) addMsg({ sys: true, text: '📵 Звонок завершён — ' + formatTime(callSeconds), ts: Date.now() });
}

/* таймер */
function startCallTimer() {
  callSeconds = 0;
  callTimer = setInterval(function() {
    callSeconds++;
    var t = formatTime(callSeconds);
    $('callHeaderTimer').textContent = t;
    var ct = $('callAvaBig').querySelector('.call-timer');
    if (ct) ct.textContent = t;
  }, 1000);
}
function stopCallTimer() { clearInterval(callTimer); callTimer = null; }
function formatTime(s) {
  var m = Math.floor(s/60); var sc = s%60;
  return m.toString().padStart(2,'0') + ':' + sc.toString().padStart(2,'0');
}
