<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мессенджер</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e12;--s:#18181f;--s2:#22222c;--b:#2a2a36;--a:#7c6af7;--a2:#a99ef9;--t:#e8e8f0;--t2:#8888aa}
body{height:100vh;font-family:sans-serif;background:var(--bg);color:var(--t);overflow:hidden;display:flex;flex-direction:column}
button{font-family:sans-serif;cursor:pointer}
input,textarea{font-family:sans-serif}

#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:24px;gap:16px}
.logo{width:72px;height:72px;background:linear-gradient(135deg,#7c6af7,#b86af7);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:36px}
#setup h1{font-size:24px;font-weight:600}
#setup p{color:var(--t2);font-size:14px;text-align:center}
.field{width:100%;max-width:320px;display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;color:var(--t2)}
.field input{padding:14px 16px;background:var(--s);border:1.5px solid var(--b);border-radius:14px;color:var(--t);font-size:16px;outline:none;width:100%}
.field input:focus{border-color:var(--a)}
.field input::placeholder{color:var(--t2)}
#enterBtn{width:100%;max-width:320px;padding:15px;background:linear-gradient(135deg,#7c6af7,#9c6af7);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:600}
#fbLink0{color:var(--a2);background:none;border:none;font-size:13px;text-decoration:underline}

#chat{display:none;flex-direction:column;flex:1;overflow:hidden}
#banner{background:#2a1f00;border-bottom:1px solid #5a4000;padding:8px 16px;font-size:12px;color:#f5c842;text-align:center}
#banner button{color:#f5c842;background:none;border:none;text-decoration:underline;font-size:12px}
.header{background:var(--s);border-bottom:1px solid var(--b);padding:12px 16px;display:flex;align-items:center;gap:12px}
.hicon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7c6af7,#b86af7);display:flex;align-items:center;justify-content:center;font-size:18px}
.hinfo h2{font-size:16px;font-weight:600}
.hinfo p{font-size:12px;color:var(--a2)}
.dot{width:7px;height:7px;background:#4cef96;border-radius:50%;display:inline-block;margin-right:4px}
#msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:4px}
#typing{min-height:20px;padding:2px 16px;font-size:12px;color:var(--t2);font-style:italic}
#replyBar{display:none;background:var(--s2);border-top:1px solid var(--b);padding:8px 16px;align-items:center;gap:10px}
#replyText{flex:1;font-size:13px;color:var(--t2);border-left:3px solid var(--a);padding-left:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#replyX{background:none;border:none;color:var(--t2);font-size:22px;line-height:1}
.ibar{background:var(--s);border-top:1px solid var(--b);padding:8px 10px;display:flex;align-items:flex-end;gap:8px}
#txtIn{flex:1;background:var(--s2);border:1.5px solid var(--b);border-radius:20px;padding:10px 14px;color:var(--t);font-size:15px;outline:none;resize:none;max-height:120px;line-height:1.4}
#txtIn:focus{border-color:var(--a)}
#txtIn::placeholder{color:var(--t2)}
.ibtn{width:42px;height:42px;border-radius:50%;border:none;background:var(--s2);color:var(--t2);font-size:19px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ibtn.rec{background:#c53030;color:#fff}
#sendBtn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#7c6af7,#9c6af7);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#sendBtn svg{width:19px;height:19px;fill:white}
#fileIn{display:none}

.mw{display:flex;flex-direction:column;margin:2px 0}
.mw.out{align-items:flex-end}
.mw.in{align-items:flex-start}
.sender{font-size:11px;color:var(--a2);font-weight:500;margin-bottom:2px;padding:0 4px}
.rpreview{font-size:12px;padding:4px 10px;border-left:3px solid var(--a);background:rgba(124,106,247,0.1);color:var(--t2);border-radius:8px;margin-bottom:4px;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.45;word-break:break-word}
.mw.out .bubble{background:var(--a);color:#fff;border-bottom-right-radius:5px}
.mw.in .bubble{background:var(--s2);color:var(--t);border-bottom-left-radius:5px}
.imgmsg{border-radius:14px;overflow:hidden;cursor:pointer;max-width:220px}
.imgmsg img{max-width:220px;max-height:220px;display:block}
.vmsg{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:18px;min-width:160px}
.mw.out .vmsg{background:var(--a);border-bottom-right-radius:5px}
.mw.in .vmsg{background:var(--s2);border-bottom-left-radius:5px}
.pbtn{width:34px;height:34px;border-radius:50%;border:none;background:rgba(255,255,255,0.2);color:#fff;font-size:14px;flex-shrink:0}
.vbars{flex:1;display:flex;align-items:center;gap:2px;height:20px}
.vbars span{display:inline-block;width:3px;border-radius:2px;background:rgba(255,255,255,0.4)}
.vdur{font-size:12px;color:rgba(255,255,255,0.8)}
.trow{display:flex;align-items:center;gap:8px;margin-top:2px;padding:0 4px}
.time{font-size:10px;color:var(--t2)}
.rbtn{font-size:11px;color:var(--t2);background:none;border:none;opacity:0.7}
.reacts{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.rbadge{background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:2px 8px;font-size:13px;cursor:pointer}
.rbadge.mine{border-color:var(--a)}
.sys{text-align:center;font-size:12px;color:var(--t2);background:var(--s2);padding:5px 14px;border-radius:20px;align-self:center;margin:6px 0}
.uploading{align-self:flex-end;font-size:12px;color:var(--t2);padding:4px 8px}

#modal{display:none;position:fixed;inset:0;background:#000b;z-index:100;align-items:center;justify-content:center;padding:20px}
.mbox{background:var(--s);border:1px solid var(--b);border-radius:20px;padding:24px;width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px}
.mbox h3{font-size:18px;font-weight:600}
.mbox p{font-size:13px;color:var(--t2);line-height:1.6}
.mbox textarea{width:100%;padding:12px 14px;background:var(--bg);border:1.5px solid var(--b);border-radius:12px;color:var(--t);font-size:12px;font-family:monospace;outline:none;resize:vertical;min-height:80px}
.mbtns{display:flex;gap:10px}
.bsec{flex:1;padding:12px;background:var(--s2);border:1px solid var(--b);border-radius:12px;color:var(--t2);font-size:14px}
.bpri{flex:1;padding:12px;background:var(--a);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:600}

#epicker{display:none;position:fixed;background:var(--s);border:1px solid var(--b);border-radius:30px;padding:8px 12px;gap:8px;z-index:200;box-shadow:0 4px 20px #0008}
#epicker span{font-size:22px;cursor:pointer}

#lb{display:none;position:fixed;inset:0;background:#000d;z-index:300;align-items:center;justify-content:center}
#lb img{max-width:95vw;max-height:90vh;border-radius:12px}
#lbx{position:absolute;top:16px;right:16px;background:rgba(0,0,0,.6);border:none;color:#fff;font-size:22px;width:38px;height:38px;border-radius:50%}
</style>
</head>
<body>

<div id="setup">
  <div class="logo">💬</div>
  <h1>Мессенджер</h1>
  <p>Общайся с друзьями в реальном времени</p>
  <div class="field"><label>Твоё имя</label><input id="nameIn" type="text" placeholder="Например: Саша" maxlength="20"></div>
  <div class="field"><label>Название комнаты</label><input id="roomIn" type="text" placeholder="Например: druzya2024" maxlength="30"></div>
  <button id="enterBtn">Войти в чат →</button>
  <button id="fbLink0">Подключить Firebase →</button>
</div>

<div id="chat">
  <div id="banner"><span>⚠️ Демо-режим. </span><button id="fbLink1">Подключить Firebase →</button></div>
  <div class="header">
    <div class="hicon">🏠</div>
    <div class="hinfo"><h2 id="roomTitle">Комната</h2><p><span class="dot"></span>онлайн</p></div>
  </div>
  <div id="msgs"></div>
  <div id="typing"></div>
  <div id="replyBar"><div id="replyText"></div><button id="replyX">×</button></div>
  <div class="ibar">
    <button class="ibtn" id="micBtn">🎤</button>
    <textarea id="txtIn" rows="1" placeholder="Написать сообщение..."></textarea>
    <button class="ibtn" id="photoBtn">📷</button>
    <button id="sendBtn"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
  </div>
  <input type="file" id="fileIn" accept="image/*">
</div>

<div id="modal">
  <div class="mbox">
    <h3>🔥 Подключить Firebase</h3>
    <p>Вставь конфигурацию из Firebase Console (от { до }):</p>
    <textarea id="cfgIn" placeholder='{"apiKey":"...","databaseURL":"..."}'></textarea>
    <div class="mbtns">
      <button class="bsec" id="modalCancel">Отмена</button>
      <button class="bpri" id="modalSave">Сохранить</button>
    </div>
  </div>
</div>

<div id="epicker">
  <span data-e="👍">👍</span>
  <span data-e="❤️">❤️</span>
  <span data-e="😂">😂</span>
  <span data-e="😮">😮</span>
  <span data-e="😢">😢</span>
  <span data-e="🔥">🔥</span>
</div>

<div id="lb"><button id="lbx">✕</button><img id="lbImg" src=""></div>

<script>
var myName='',myRoom='',db=null,msgsRef=null,fbOk=false;
var mediaRec=null,recChunks=[],isRec=false,recStart=0;
var replyTo=null,typingTimer=null,lastTyping=0,pickerKey=null;

function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function getSaved(){try{var v=localStorage.getItem('fbcfg');return v?JSON.parse(v):null;}catch(e){return null;}}

function initFB(cfg,auto){
  try{
    var app=firebase.initializeApp(cfg,'c'+Date.now());
    db=firebase.database(app);fbOk=true;
    if(auto)startChat();return true;
  }catch(e){console.error(e);return false;}
}

function startChat(){
  document.getElementById('banner').style.display='none';
  document.getElementById('msgs').innerHTML='';
  msgsRef=db.ref('rooms/'+myRoom+'/messages');
  msgsRef.on('child_added',function(s){var m=s.val();if(m)renderMsg(m,s.key);});
  msgsRef.on('child_changed',function(s){var m=s.val();if(m&&m.reactions)updateReactions(s.key,m.reactions);});
  db.ref('rooms/'+myRoom+'/typing').on('value',function(s){
    var d=s.val()||{},others=[];
    Object.keys(d).forEach(function(k){if(k!==myName&&Date.now()-d[k]<4000)others.push(k);});
    document.getElementById('typing').textContent=others.length?(others.join(', ')+(others.length>1?' печатают...'>' печатает...')):'';
  });
  msgsRef.push({type:'sys',text:myName+' вошёл в чат',ts:firebase.database.ServerValue.TIMESTAMP});
}

function showDemo(){
  document.getElementById('msgs').innerHTML='';
  [{type:'sys',text:'Демо-режим. Подключи Firebase для общения.'},
   {from:'Друг',text:'Привет! 👋',ts:Date.now()-60000},
   {from:myName,text:'Привет!',ts:Date.now()-30000}
  ].forEach(function(m){renderMsg(m,'d'+Math.random());});
}

function renderMsg(m,key){
  var w=document.getElementById('msgs');
  if(m.type==='sys'){
    var el=document.createElement('div');el.className='sys';el.textContent=m.text;
    w.appendChild(el);w.scrollTop=w.scrollHeight;return;
  }
  var isMe=m.from===myName;
  var el=document.createElement('div');el.className='mw '+(isMe?'out':'in');el.dataset.key=key;
  var t=m.ts?new Date(m.ts).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'}):'';
  var h=(!isMe?'<div class="sender">'+esc(m.from)+'</div>':'');
  if(m.replyTo)h+='<div class="rpreview">↩ '+esc(m.replyTo)+'</div>';
  if(m.type==='image'){
    h+='<div class="imgmsg"><img src="'+m.data+'" loading="lazy"></div>';
  }else if(m.type==='voice'){
    var bars=Array.from({length:18},function(_,i){return '<span style="height:'+(5+Math.abs(Math.sin(i*.7)*9))+'px"></span>';}).join('');
    h+='<div class="vmsg"><button class="pbtn">▶</button><div class="vbars">'+bars+'</div><span class="vdur">'+(m.dur||'0:00')+'</span></div>';
  }else{
    h+='<div class="bubble">'+esc(m.text||'')+'</div>';
  }
  h+='<div class="trow"><span class="time">'+t+'</span>';
  h+='<button class="rbtn reply-btn">↩</button>';
  if(m.type!=='image'&&m.type!=='voice')h+='<button class="rbtn react-btn">😊</button>';
  h+='</div><div class="reacts" id="r_'+key+'"></div>';
  el.innerHTML=h;

  var img=el.querySelector('.imgmsg');
  if(img)img.addEventListener('click',function(){openLB(this.querySelector('img').src);});
  var pb=el.querySelector('.pbtn');
  if(pb)pb.addEventListener('click',function(){playVoice(m.data,this);});
  el.querySelector('.reply-btn').addEventListener('click',function(){setReply(m.from||'',m.text||'');});
  var rb=el.querySelector('.react-btn');
  if(rb)rb.addEventListener('click',function(e){e.stopPropagation();showPicker(key,this);});

  w.appendChild(el);
  if(m.reactions)updateReactions(key,m.reactions);
  w.scrollTop=w.scrollHeight;
}

function showPicker(key,anchor){
  pickerKey=key;
  var p=document.getElementById('epicker');
  p.style.display='flex';
  var r=anchor.getBoundingClientRect();
  p.style.top=Math.max(4,r.top-56)+'px';
  p.style.left=Math.max(4,r.left-80)+'px';
}

document.getElementById('epicker').addEventListener('click',function(e){
  var span=e.target.closest('span');
  if(span&&pickerKey){addReaction(pickerKey,span.dataset.e);}
  document.getElementById('epicker').style.display='none';
});
document.addEventListener('click',function(e){
  if(!e.target.closest('#epicker')&&!e.target.classList.contains('react-btn'))
    document.getElementById('epicker').style.display='none';
});

function addReaction(key,emoji){
  if(!fbOk||!msgsRef)return;
  var ref=db.ref('rooms/'+myRoom+'/messages/'+key+'/reactions/'+emoji+'/'+myName);
  ref.once('value',function(s){if(s.exists())ref.remove();else ref.set(true);});
}

function updateReactions(key,reactions){
  var el=document.getElementById('r_'+key);
  if(!el||!reactions)return;el.innerHTML='';
  Object.keys(reactions).forEach(function(emoji){
    var users=reactions[emoji],count=Object.keys(users).length;
    if(!count)return;
    var b=document.createElement('div');
    b.className='rbadge'+(users[myName]?' mine':'');
    b.textContent=emoji+' '+count;
    b.addEventListener('click',function(){addReaction(key,emoji);});
    el.appendChild(b);
  });
}

function setReply(from,text){
  replyTo={from:from,text:text.slice(0,40)};
  document.getElementById('replyText').textContent=from+': '+replyTo.text;
  document.getElementById('replyBar').style.display='flex';
  document.getElementById('txtIn').focus();
}
function clearReply(){replyTo=null;document.getElementById('replyBar').style.display='none';}

function send(){
  var inp=document.getElementById('txtIn'),txt=inp.value.trim();
  if(!txt)return;inp.value='';inp.style.height='auto';
  if(fbOk)db.ref('rooms/'+myRoom+'/typing/'+myName).remove();
  var msg={from:myName,text:txt,ts:fbOk?firebase.database.ServerValue.TIMESTAMP:Date.now()};
  if(replyTo){msg.replyTo=replyTo.from+': '+replyTo.text;clearReply();}
  if(fbOk&&msgsRef)msgsRef.push(msg);else renderMsg(msg,'l'+Date.now());
}

function sendPhoto(input){
  var file=input.files[0];if(!file)return;input.value='';
  if(file.size>800*1024){alert('Фото слишком большое. До 800 КБ.');return;}
  var w=document.getElementById('msgs'),up=document.createElement('div');
  up.className='uploading';up.textContent='Отправка...';w.appendChild(up);
  var reader=new FileReader();
  reader.onload=function(e){
    up.remove();
    var msg={from:myName,type:'image',data:e.target.result,ts:fbOk?firebase.database.ServerValue.TIMESTAMP:Date.now()};
    if(replyTo){msg.replyTo=replyTo.from+': '+replyTo.text;clearReply();}
    if(fbOk&&msgsRef)msgsRef.push(msg);else renderMsg(msg,'l'+Date.now());
  };reader.readAsDataURL(file);
}

function toggleRec(){
  if(isRec){stopRec();return;}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    mediaRec=new MediaRecorder(stream);recChunks=[];
    mediaRec.ondataavailable=function(e){if(e.data.size>0)recChunks.push(e.data);};
    mediaRec.onstop=function(){stream.getTracks().forEach(function(t){t.stop();});finishVoice();};
    mediaRec.start();isRec=true;recStart=Date.now();
    document.getElementById('micBtn').classList.add('rec');
    document.getElementById('micBtn').textContent='⏹';
  }).catch(function(){alert('Нет доступа к микрофону');});
}
function stopRec(){
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
  isRec=false;
  document.getElementById('micBtn').classList.remove('rec');
  document.getElementById('micBtn').textContent='🎤';
}
function finishVoice(){
  var dur=Math.round((Date.now()-recStart)/1000);
  var blob=new Blob(recChunks,{type:'audio/webm'});
  if(blob.size>1.5*1024*1024){alert('Слишком длинное. До 1 минуты.');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    var msg={from:myName,type:'voice',data:e.target.result,dur:Math.floor(dur/60)+':'+String(dur%60).padStart(2,'0'),ts:fbOk?firebase.database.ServerValue.TIMESTAMP:Date.now()};
    if(fbOk&&msgsRef)msgsRef.push(msg);else renderMsg(msg,'l'+Date.now());
  };reader.readAsDataURL(blob);
}
function playVoice(data,btn){
  var a=new Audio(data);btn.textContent='⏸';
  a.play();a.onended=function(){btn.textContent='▶';};
}
function openLB(src){document.getElementById('lbImg').src=src;document.getElementById('lb').style.display='flex';}

function openModal(){
  document.getElementById('modal').style.display='flex';
  var s=getSaved();if(s)document.getElementById('cfgIn').value=JSON.stringify(s,null,2);
}
function closeModal(){document.getElementById('modal').style.display='none';}
function saveConfig(){
  var val=document.getElementById('cfgIn').value.trim();
  if(!val){alert('Вставь конфигурацию');return;}
  try{
    var cfg=JSON.parse(val);
    localStorage.setItem('fbcfg',JSON.stringify(cfg));
    var ok=initFB(cfg,false);
    if(ok){closeModal();if(myRoom)startChat();else alert('Firebase подключён!');}
    else alert('Ошибка подключения.');
  }catch(e){alert('Неверный формат.');}
}

// events
document.getElementById('enterBtn').addEventListener('click',function(){
  var n=document.getElementById('nameIn').value.trim();
  var r=document.getElementById('roomIn').value.trim().replace(/\s+/g,'-').toLowerCase();
  if(!n){alert('Введи имя');return;}if(!r){alert('Введи название комнаты');return;}
  myName=n;myRoom=r;
  document.getElementById('setup').style.display='none';
  document.getElementById('chat').style.display='flex';
  document.getElementById('roomTitle').textContent='# '+r;
  var saved=getSaved();
  if(saved)initFB(saved,true);
  else{document.getElementById('banner').style.display='block';showDemo();}
});
document.getElementById('fbLink0').addEventListener('click',openModal);
document.getElementById('fbLink1').addEventListener('click',openModal);
document.getElementById('modalCancel').addEventListener('click',closeModal);
document.getElementById('modalSave').addEventListener('click',saveConfig);
document.getElementById('replyX').addEventListener('click',clearReply);
document.getElementById('sendBtn').addEventListener('click',send);
document.getElementById('photoBtn').addEventListener('click',function(){document.getElementById('fileIn').click();});
document.getElementById('micBtn').addEventListener('click',toggleRec);
document.getElementById('fileIn').addEventListener('change',function(){sendPhoto(this);});
document.getElementById('lbx').addEventListener('click',function(){document.getElementById('lb').style.display='none';});
document.getElementById('txtIn').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('txtIn').addEventListener('input',function(){
  this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';
  if(!fbOk)return;
  var now=Date.now();
  if(now-lastTyping>2000){lastTyping=now;db.ref('rooms/'+myRoom+'/typing/'+myName).set(now);}
  clearTimeout(typingTimer);
  typingTimer=setTimeout(function(){db.ref('rooms/'+myRoom+'/typing/'+myName).remove();},3000);
});
</script>
</body>
</html>
